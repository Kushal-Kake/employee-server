name: chat-bot
services:
  cont-db-pg:
    container_name: cont-db-pg
    image: ankane/pgvector:${PG_VERSION:-v0.5.1}
    ports:
      - ${API_DB_PORT:-5432}:5432
    volumes:
      - disk-db-pg:/var/lib/postgresql/data.
    environment:
      POSTGRES_DB: ${API_DB_NAME}
      POSTGRES_USER: ${API_DB_USR_NAME}
      POSTGRES_PASSWORD: ${API_DB_PASSWD}
volumes:
  disk-db-pg:
    driver: local
networks:
  default:
    name: ntw-default
